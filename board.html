<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시판</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Gowun Dodum", sans-serif;
        background: #f1f5f9;
        min-height: 100vh;
      }

      .top-bar {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        padding: 12px 24px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }
      .top-bar a {
        color: #fff;
        text-decoration: none;
        font-size: 1.2rem;
      }
      .top-bar h1 {
        font-size: 1rem;
        flex: 1;
      }

      .container {
        max-width: 860px;
        margin: 32px auto;
        padding: 0 16px 60px;
      }

      /* 게시글 목록 */
      .board-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .board-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: #1e293b;
      }
      .btn-write {
        padding: 8px 20px;
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.88rem;
        cursor: pointer;
      }
      .btn-write:hover {
        background: #6d28d9;
      }

      .post-list {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        overflow: hidden;
      }
      .post-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        border-bottom: 1px solid #f1f5f9;
        cursor: pointer;
        transition: background 0.15s;
      }
      .post-item:last-child {
        border-bottom: none;
      }
      .post-item:hover {
        background: #f8fafc;
      }
      .post-num {
        font-size: 0.8rem;
        color: #94a3b8;
        width: 36px;
        flex-shrink: 0;
        text-align: center;
      }
      .post-info {
        flex: 1;
        min-width: 0;
      }
      .post-title {
        font-size: 0.92rem;
        color: #1e293b;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .post-meta {
        font-size: 0.72rem;
        color: #94a3b8;
        margin-top: 3px;
      }
      .post-date {
        font-size: 0.78rem;
        color: #94a3b8;
        flex-shrink: 0;
      }
      .empty-msg {
        padding: 40px;
        text-align: center;
        color: #94a3b8;
        font-size: 0.88rem;
      }

      /* 관리자 패널 */
      .admin-panel {
        margin-top: 40px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        overflow: hidden;
      }
      .admin-panel-header {
        padding: 14px 20px;
        background: #faf5ff;
        border-bottom: 1px solid #e9d5ff;
        font-size: 0.9rem;
        font-weight: 700;
        color: #6d28d9;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .user-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 20px;
        border-bottom: 1px solid #f1f5f9;
      }
      .user-row:last-child {
        border-bottom: none;
      }
      .user-info {
        flex: 1;
        min-width: 0;
      }
      .user-name {
        font-size: 0.88rem;
        color: #1e293b;
      }
      .user-email {
        font-size: 0.72rem;
        color: #94a3b8;
      }
      .role-badge {
        font-size: 0.72rem;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .role-badge.admin {
        background: #ede9fe;
        color: #7c3aed;
      }
      .role-badge.user {
        background: #f1f5f9;
        color: #64748b;
      }
      .btn-role {
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 0.78rem;
        font-family: inherit;
        cursor: pointer;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        color: #475569;
      }
      .btn-role:hover {
        background: #ede9fe;
        border-color: #c4b5fd;
        color: #7c3aed;
      }
      .btn-role.me {
        opacity: 0.4;
        cursor: default;
        pointer-events: none;
      }

      /* 모달 공통 */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 100;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: #fff;
        border-radius: 16px;
        width: 100%;
        max-width: 640px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      }
      .modal-header {
        padding: 18px 22px 14px;
        border-bottom: 1px solid #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .modal-header h2 {
        font-size: 1rem;
        color: #1e293b;
      }
      .modal-close {
        background: none;
        border: none;
        font-size: 1.3rem;
        cursor: pointer;
        color: #94a3b8;
        line-height: 1;
      }
      .modal-body {
        padding: 20px 22px;
      }
      .modal-footer {
        padding: 12px 22px 18px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      /* 게시글 상세 */
      .detail-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 8px;
      }
      .detail-meta {
        font-size: 0.78rem;
        color: #94a3b8;
        margin-bottom: 18px;
        padding-bottom: 14px;
        border-bottom: 1px solid #f1f5f9;
      }
      .detail-content {
        font-size: 0.9rem;
        color: #334155;
        line-height: 1.8;
        white-space: pre-wrap;
      }

      /* 글쓰기/수정 폼 */
      .form-field {
        margin-bottom: 14px;
      }
      .form-field label {
        display: block;
        font-size: 0.82rem;
        color: #64748b;
        margin-bottom: 5px;
      }
      .form-field input,
      .form-field textarea {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.88rem;
        outline: none;
        color: #1e293b;
        background: #f8fafc;
      }
      .form-field input:focus,
      .form-field textarea:focus {
        border-color: #7c3aed;
        background: #fff;
      }
      .form-field textarea {
        resize: vertical;
        min-height: 180px;
        line-height: 1.7;
      }

      .btn-cancel {
        padding: 8px 18px;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
        color: #475569;
      }
      .btn-submit {
        padding: 8px 22px;
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
      }
      .btn-submit:hover {
        background: #6d28d9;
      }
      .btn-delete {
        padding: 8px 18px;
        background: #fee2e2;
        color: #ef4444;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
        margin-right: auto;
      }
      .btn-delete:hover {
        background: #fecaca;
      }
      .btn-edit {
        padding: 8px 18px;
        background: #f1f5f9;
        color: #475569;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
      }
      .btn-edit:hover {
        background: #ede9fe;
        color: #7c3aed;
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <a href="/">&#8592;</a>
      <h1>📋 게시판</h1>
    </div>

    <div class="container">
      <div class="board-header">
        <span class="board-title">공지 · 게시글</span>
        <button
          class="btn-write"
          id="btnWrite"
          style="display: none"
          onclick="openWriteModal()"
        >
          + 글쓰기
        </button>
      </div>

      <div class="post-list" id="postList">
        <div class="empty-msg">게시글이 없습니다.</div>
      </div>

      <!-- 관리자 전용 유저 관리 패널 -->
      <div class="admin-panel" id="adminPanel" style="display: none">
        <div class="admin-panel-header">⚙️ 회원 등급 관리</div>
        <div id="userList"></div>
      </div>
    </div>

    <!-- 게시글 상세 모달 -->
    <div class="modal-overlay" id="detailModal">
      <div class="modal">
        <div class="modal-header">
          <h2>게시글</h2>
          <button class="modal-close" onclick="closeModal('detailModal')">
            ×
          </button>
        </div>
        <div class="modal-body">
          <div class="detail-title" id="detailTitle"></div>
          <div class="detail-meta" id="detailMeta"></div>
          <div class="detail-content" id="detailContent"></div>
        </div>
        <div class="modal-footer" id="detailFooter">
          <button class="btn-cancel" onclick="closeModal('detailModal')">
            닫기
          </button>
        </div>
      </div>
    </div>

    <!-- 글쓰기/수정 모달 -->
    <div class="modal-overlay" id="writeModal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="writeModalTitle">글쓰기</h2>
          <button class="modal-close" onclick="closeModal('writeModal')">
            ×
          </button>
        </div>
        <div class="modal-body">
          <div class="form-field">
            <label>제목</label>
            <input
              type="text"
              id="postTitleInput"
              placeholder="제목을 입력하세요"
            />
          </div>
          <div class="form-field">
            <label>내용</label>
            <textarea
              id="postContentInput"
              placeholder="내용을 입력하세요"
            ></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal('writeModal')">
            취소
          </button>
          <button class="btn-submit" onclick="submitPost()">등록</button>
        </div>
      </div>
    </div>

    <script src="/js/config.js"></script>
    <script>
      let me = null;
      let editingPostId = null;

      async function init() {
        me = await checkAuth();
        if (!me) return;
        if (me.role === "admin") {
          document.getElementById("btnWrite").style.display = "block";
          document.getElementById("adminPanel").style.display = "block";
          loadUsers();
        }
        loadPosts();
      }

      function fmtDate(s) {
        const d = new Date(s);
        return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
      }
      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      async function loadPosts() {
        const res = await apiFetch("/api/board/posts");
        const posts = await res.json();
        const el = document.getElementById("postList");
        if (!posts.length) {
          el.innerHTML = '<div class="empty-msg">아직 게시글이 없습니다.</div>';
          return;
        }
        el.innerHTML = posts
          .map(
            (p, i) => `
          <div class="post-item" onclick="openDetail(${p.id})">
            <div class="post-num">${posts.length - i}</div>
            <div class="post-info">
              <div class="post-title">${esc(p.title)}</div>
              <div class="post-meta">${esc(p.author_name || p.author_email)}</div>
            </div>
            <div class="post-date">${fmtDate(p.created_at)}</div>
          </div>`,
          )
          .join("");
      }

      async function openDetail(id) {
        const res = await apiFetch(`/api/board/posts/${id}`);
        const post = await res.json();
        document.getElementById("detailTitle").textContent = post.title;
        document.getElementById("detailMeta").textContent =
          `${post.author_name || post.author_email}  ·  ${fmtDate(post.created_at)}` +
          (post.updated_at !== post.created_at
            ? `  (수정됨: ${fmtDate(post.updated_at)})`
            : "");
        document.getElementById("detailContent").textContent = post.content;

        const footer = document.getElementById("detailFooter");
        if (me.role === "admin") {
          footer.innerHTML = `
            <button class="btn-delete" onclick="deletePost(${post.id})">삭제</button>
            <button class="btn-edit" onclick="openEditModal(${post.id}, \`${esc(post.title)}\`, \`${esc(post.content)}\`)">수정</button>
            <button class="btn-cancel" onclick="closeModal('detailModal')">닫기</button>`;
        } else {
          footer.innerHTML = `<button class="btn-cancel" onclick="closeModal('detailModal')">닫기</button>`;
        }
        document.getElementById("detailModal").classList.add("open");
      }

      function openWriteModal() {
        editingPostId = null;
        document.getElementById("writeModalTitle").textContent = "글쓰기";
        document.getElementById("postTitleInput").value = "";
        document.getElementById("postContentInput").value = "";
        document.querySelector("#writeModal .btn-submit").textContent = "등록";
        document.getElementById("writeModal").classList.add("open");
      }

      function openEditModal(id, title, content) {
        editingPostId = id;
        document.getElementById("writeModalTitle").textContent = "게시글 수정";
        document.getElementById("postTitleInput").value = title;
        document.getElementById("postContentInput").value = content;
        document.querySelector("#writeModal .btn-submit").textContent = "수정";
        closeModal("detailModal");
        document.getElementById("writeModal").classList.add("open");
      }

      async function submitPost() {
        const title = document.getElementById("postTitleInput").value.trim();
        const content = document
          .getElementById("postContentInput")
          .value.trim();
        if (!title || !content) return alert("제목과 내용을 입력하세요");

        if (editingPostId) {
          await apiFetch(`/api/board/posts/${editingPostId}`, {
            method: "PUT",
            body: JSON.stringify({ title, content }),
          });
        } else {
          await apiFetch("/api/board/posts", {
            method: "POST",
            body: JSON.stringify({ title, content }),
          });
        }
        closeModal("writeModal");
        loadPosts();
      }

      async function deletePost(id) {
        if (!confirm("이 게시글을 삭제하시겠습니까?")) return;
        await apiFetch(`/api/board/posts/${id}`, { method: "DELETE" });
        closeModal("detailModal");
        loadPosts();
      }

      async function loadUsers() {
        const res = await apiFetch("/api/board/users");
        const users = await res.json();
        document.getElementById("userList").innerHTML = users
          .map(
            (u) => `
          <div class="user-row">
            <div class="user-info">
              <div class="user-name">${esc(u.name || u.email)}</div>
              <div class="user-email">${esc(u.email)}</div>
            </div>
            <span class="role-badge ${u.role}">${u.role === "admin" ? "관리자" : "일반"}</span>
            <button class="btn-role ${u.id === me.id ? "me" : ""}"
              onclick="changeRole(${u.id}, '${u.role === "admin" ? "user" : "admin"}', this)">
              ${u.role === "admin" ? "일반으로 변경" : "관리자로 변경"}
            </button>
          </div>`,
          )
          .join("");
      }

      async function changeRole(userId, newRole, btn) {
        btn.disabled = true;
        await apiFetch(`/api/board/users/${userId}/role`, {
          method: "PATCH",
          body: JSON.stringify({ role: newRole }),
        });
        loadUsers();
      }

      function closeModal(id) {
        document.getElementById(id).classList.remove("open");
      }

      document.querySelectorAll(".modal-overlay").forEach((el) => {
        el.addEventListener("click", (e) => {
          if (e.target === el) el.classList.remove("open");
        });
      });

      init();
    </script>
  </body>
</html>
