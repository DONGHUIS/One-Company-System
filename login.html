<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 — MY WORK SPACE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .login-wrap {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        width: 100%;
        max-width: 420px;
      }
      .login-logo {
        font-size: 3rem;
        line-height: 1;
      }
      .login-title {
        font-family: "Black Han Sans", sans-serif;
        font-size: 2rem;
        color: var(--text);
        letter-spacing: 2px;
        text-align: center;
      }
      .login-subtitle {
        font-size: 0.95rem;
        color: var(--text-muted);
        margin-top: -20px;
        text-align: center;
      }
      .login-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 36px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      /* 탭 */
      .login-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin-bottom: 4px;
      }
      .login-tab {
        flex: 1;
        padding: 10px;
        border: none;
        background: none;
        font-family: inherit;
        font-size: 0.9rem;
        color: var(--text-muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.18s;
      }
      .login-tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
        font-weight: 600;
      }
      /* 폼 */
      .login-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .login-form.hidden {
        display: none;
      }
      .login-input {
        width: 100%;
        padding: 11px 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--bg);
        color: var(--text);
        font-family: inherit;
        font-size: 0.92rem;
        box-sizing: border-box;
        outline: none;
        transition: border-color 0.18s;
      }
      .login-input:focus {
        border-color: var(--primary);
      }
      .login-submit-btn {
        padding: 12px;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.18s;
        margin-top: 2px;
      }
      .login-submit-btn:hover {
        opacity: 0.88;
      }
      .login-submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      /* 구분선 */
      .login-divider {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-muted);
        font-size: 0.8rem;
      }
      .login-divider::before,
      .login-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      /* Google 버튼 */
      .login-google-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 12px 28px;
        font-family: "Gowun Dodum", sans-serif;
        font-size: 1rem;
        color: var(--text);
        cursor: pointer;
        transition:
          background 0.18s,
          box-shadow 0.18s,
          border-color 0.18s;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        width: 100%;
        justify-content: center;
      }
      .login-google-btn:hover {
        background: var(--surface2);
        border-color: rgba(124, 58, 237, 0.3);
        box-shadow: 0 4px 16px rgba(124, 58, 237, 0.12);
      }
      .login-google-btn:active {
        transform: scale(0.98);
      }
      /* 에러/성공 */
      .login-error {
        font-size: 0.84rem;
        color: var(--danger);
        text-align: center;
        display: none;
      }
      .login-success {
        font-size: 0.84rem;
        color: #22c55e;
        text-align: center;
        display: none;
      }
      .login-note {
        font-size: 0.78rem;
        color: var(--text-muted);
        text-align: center;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="bg-blur b1"></div>
    <div class="bg-blur b2"></div>
    <div class="bg-blur b3"></div>

    <div class="login-wrap">
      <div class="login-logo">📝</div>
      <div class="login-title">MY WORK SPACE</div>
      <div class="login-subtitle">하나의 서비스 여러개의 업무를 처리</div>

      <div class="login-box">
        <!-- 탭 -->
        <div class="login-tabs">
          <button
            class="login-tab active"
            id="tabLogin"
            onclick="switchTab('login')"
          >
            로그인
          </button>
          <button
            class="login-tab"
            id="tabRegister"
            onclick="switchTab('register')"
          >
            회원가입
          </button>
        </div>

        <!-- 로그인 폼 -->
        <div class="login-form" id="formLogin">
          <input
            class="login-input"
            type="email"
            id="loginEmail"
            placeholder="이메일"
          />
          <input
            class="login-input"
            type="password"
            id="loginPassword"
            placeholder="비밀번호"
            onkeydown="if (event.key === 'Enter') submitLogin();"
          />
          <div class="login-note" style="margin-top: -4px">
            ⚠️ 일반 로그인 시 Gmail · Drive · Calendar 등<br />Google 연동 기능
            이용이 제한될 수 있습니다.
          </div>
          <button
            class="login-submit-btn"
            id="loginBtn"
            onclick="submitLogin()"
          >
            로그인
          </button>
          <div class="login-divider">또는</div>
          <button class="login-google-btn" onclick="gmailLogin()">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"
              />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"
              />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05"
              />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335"
              />
            </svg>
            Google 로그인
          </button>
          <div class="login-note">
            Google 로그인 시 Gmail · Drive · Calendar 연동됩니다
          </div>
        </div>

        <!-- 회원가입 폼 -->
        <div class="login-form hidden" id="formRegister">
          <input
            class="login-input"
            type="text"
            id="regName"
            placeholder="이름"
          />
          <input
            class="login-input"
            type="email"
            id="regEmail"
            placeholder="이메일"
          />
          <input
            class="login-input"
            type="password"
            id="regPassword"
            placeholder="비밀번호 (6자 이상)"
            onkeydown="if (event.key === 'Enter') submitRegister();"
          />
          <div class="login-note" style="margin-top: -4px">
            ⚠️ 일반 회원가입 시 Gmail · Drive · Calendar 등<br />Google 연동
            기능 이용이 제한될 수 있습니다.
          </div>
          <button
            class="login-submit-btn"
            id="registerBtn"
            onclick="submitRegister()"
          >
            가입하기
          </button>
        </div>

        <div class="login-error" id="loginError"></div>
        <div class="login-success" id="loginSuccess"></div>
      </div>
    </div>

    <script>
      const SERVER_URL = window.location.hostname === "localhost" ? "http://localhost:4000" : window.location.origin;

      if (location.pathname.endsWith("login.html")) {
        history.replaceState(null, "", location.href.replace("login.html", ""));
      }

      async function checkAlreadyLoggedIn() {
        try {
          const res = await fetch(`${SERVER_URL}/auth/me`, {
            credentials: "include",
          });
          if (res.ok) location.replace("./");
        } catch {}
      }
      checkAlreadyLoggedIn();

      function switchTab(tab) {
        document
          .getElementById("tabLogin")
          .classList.toggle("active", tab === "login");
        document
          .getElementById("tabRegister")
          .classList.toggle("active", tab === "register");
        document
          .getElementById("formLogin")
          .classList.toggle("hidden", tab !== "login");
        document
          .getElementById("formRegister")
          .classList.toggle("hidden", tab !== "register");
        hideMessages();
      }

      function showError(msg) {
        const el = document.getElementById("loginError");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("loginSuccess").style.display = "none";
      }
      function showSuccess(msg) {
        const el = document.getElementById("loginSuccess");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("loginError").style.display = "none";
      }
      function hideMessages() {
        document.getElementById("loginError").style.display = "none";
        document.getElementById("loginSuccess").style.display = "none";
      }

      function gmailLogin() {
        location.href = `${SERVER_URL}/auth/google`;
      }

      async function submitLogin() {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;
        if (!email || !password)
          return showError("이메일과 비밀번호를 입력하세요");

        const btn = document.getElementById("loginBtn");
        btn.disabled = true;
        btn.textContent = "로그인 중...";
        hideMessages();

        try {
          const res = await fetch(`${SERVER_URL}/auth/local/login`, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (!res.ok) return showError(data.error || "로그인 실패");
          location.replace("./");
        } catch {
          showError("서버 연결 오류");
        } finally {
          btn.disabled = false;
          btn.textContent = "로그인";
        }
      }

      async function submitRegister() {
        const name = document.getElementById("regName").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        if (!name || !email || !password)
          return showError("모든 항목을 입력하세요");

        const btn = document.getElementById("registerBtn");
        btn.disabled = true;
        btn.textContent = "가입 중...";
        hideMessages();

        try {
          const res = await fetch(`${SERVER_URL}/auth/register`, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password }),
          });
          const data = await res.json();
          if (!res.ok) return showError(data.error || "가입 실패");
          showSuccess("가입 완료! 로그인해 주세요");
          switchTab("login");
          document.getElementById("loginEmail").value = email;
        } catch {
          showError("서버 연결 오류");
        } finally {
          btn.disabled = false;
          btn.textContent = "가입하기";
        }
      }
    </script>
  </body>
</html>
