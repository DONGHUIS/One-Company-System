<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 — MY WORK SPACE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .login-wrap {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        width: 100%;
        max-width: 420px;
      }

      .login-logo {
        font-size: 3rem;
        line-height: 1;
      }

      .login-title {
        font-family: "Black Han Sans", sans-serif;
        font-size: 2rem;
        color: var(--text);
        letter-spacing: 2px;
        text-align: center;
      }

      .login-subtitle {
        font-size: 0.95rem;
        color: var(--text-muted);
        margin-top: -20px;
        text-align: center;
      }

      .login-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 40px 36px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .login-box-title {
        font-size: 1rem;
        color: var(--text-muted);
        text-align: center;
      }

      .login-google-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 13px 28px;
        font-family: "Gowun Dodum", sans-serif;
        font-size: 1rem;
        color: var(--text);
        cursor: pointer;
        transition:
          background 0.18s,
          box-shadow 0.18s,
          border-color 0.18s;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        width: 100%;
        justify-content: center;
      }

      .login-google-btn:hover {
        background: var(--surface2);
        border-color: rgba(124, 58, 237, 0.3);
        box-shadow: 0 4px 16px rgba(124, 58, 237, 0.12);
      }

      .login-google-btn:active {
        transform: scale(0.98);
      }

      .login-error {
        font-size: 0.88rem;
        color: var(--danger);
        text-align: center;
        display: none;
      }

      .login-note {
        font-size: 0.8rem;
        color: var(--text-muted);
        text-align: center;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="bg-blur b1"></div>
    <div class="bg-blur b2"></div>
    <div class="bg-blur b3"></div>

    <div class="login-wrap">
      <div class="login-logo">📝</div>
      <div class="login-title">MY WORK SPACE</div>
      <div class="login-subtitle">하나의 서비스 여러개의 업무를 처리</div>

      <div class="login-box">
        <div class="login-box-title">
          한번의 로그인으로<br />메모,일정,메일,파일 이 모든것을<br />
          통합으로 관리하세요.
        </div>

        <button class="login-google-btn" onclick="gmailLogin()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4"
            />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853"
            />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
              fill="#FBBC05"
            />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335"
            />
          </svg>
          Google 로그인
        </button>

        <div class="login-error" id="loginError"></div>

        <div class="login-note">
          Gmail · Google Drive · Google Calendar<br />접근 권한이 요청됩니다
        </div>
      </div>
    </div>

    <script>
      const SERVER_URL = "http://localhost:4000";

      // URL에서 login.html 숨기기
      if (location.pathname.endsWith("login.html")) {
        history.replaceState(null, "", location.href.replace("login.html", ""));
      }

      // 이미 로그인된 상태면 index.html로 이동
      async function checkAlreadyLoggedIn() {
        try {
          const res = await fetch(`${SERVER_URL}/auth/me`, { credentials: "include" });
          if (res.ok) location.replace("./");
        } catch {}
      }
      checkAlreadyLoggedIn();

      function gmailLogin() {
        location.href = `${SERVER_URL}/auth/google`;
      }

      function showError(msg) {
        const el = document.getElementById("loginError");
        el.textContent = msg;
        el.style.display = "block";
      }
    </script>
  </body>
</html>
