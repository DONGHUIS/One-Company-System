<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주간 활동 리포트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.09);
      --accent: #7c3aed;
      --accent3: #059669;
      --text: #1e293b;
      --text-muted: #64748b;
    }
    body {
      font-family: "Gowun Dodum", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px 60px;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 900px;
      margin: 0 auto 28px;
    }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; }
    .page-header .week-range { font-size: 0.85rem; color: var(--text-muted); }
    .back-btn {
      text-decoration: none;
      font-size: 0.85rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 5px 14px;
    }
    .back-btn:hover { background: var(--accent); color: #fff; }

    .grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 22px;
    }
    .card.full { grid-column: 1 / -1; }
    .card-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .stat-row { display: flex; gap: 16px; }
    .stat-box {
      flex: 1;
      background: var(--bg);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-box .stat-num { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-box .stat-num.green { color: var(--accent3); }
    .stat-box .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

    .chart { display: flex; align-items: flex-end; gap: 10px; height: 120px; margin-bottom: 8px; }
    .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
    .bar-wrap { width: 100%; display: flex; gap: 3px; justify-content: center; align-items: flex-end; }
    .bar { width: 12px; border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.4s ease; }
    .bar.memo-bar { background: var(--accent); }
    .bar.time-bar  { background: var(--accent3); }
    .bar-day { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; }
    .chart-legend { display: flex; gap: 16px; font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
    .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }

    .team-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .team-table th {
      text-align: left; padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted); font-weight: 600; font-size: 0.78rem;
    }
    .team-table td { padding: 10px; border-bottom: 1px solid var(--border); }
    .team-table tr:last-child td { border-bottom: none; }
    .team-table tr.me-row td { background: #f5f3ff; }
    .team-rank { font-weight: 700; color: var(--text-muted); }
    .team-rank.gold { color: #f59e0b; }
    .team-rank.silver { color: #94a3b8; }
    .team-rank.bronze { color: #b45309; }
    .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; }
    .badge-memo { background: #ede9fe; color: var(--accent); }
    .badge-time { background: #d1fae5; color: var(--accent3); }

    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-item {
      background: #ede9fe; color: var(--accent);
      border-radius: 20px; padding: 5px 14px;
      font-size: 0.85rem; font-weight: 600;
    }
    .tag-item span { font-size: 0.78rem; color: var(--text-muted); margin-left: 4px; }

    .loading { text-align: center; color: var(--text-muted); padding: 40px; }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .card.full { grid-column: 1; }
    }
  </style>
</head>
<body>
  <div class="page-header">
    <div>
      <h1>주간 활동 리포트</h1>
      <div class="week-range" id="weekRange">불러오는 중...</div>
    </div>
    <a href="/" class="back-btn">← 홈으로</a>
  </div>

  <div class="grid" id="reportGrid">
    <div class="card full loading">리포트 불러오는 중...</div>
  </div>

  <script>
    function fmtTime(min) {
      const m = Number(min);
      if (m < 60) return `${m}분`;
      return `${Math.floor(m / 60)}시간 ${m % 60}분`;
    }

    async function loadReport() {
      const grid = document.getElementById("reportGrid");
      try {
        const res = await fetch("/api/report/weekly", { credentials: "include" });
        if (!res.ok) { location.href = "/login.html"; return; }
        const data = await res.json();

        document.getElementById("weekRange").textContent =
          `${data.weekRange.start} ~ ${data.weekRange.end}`;

        // 차트 최대값 (메모는 x5 스케일로 시간과 비교)
        const maxMemo = Math.max(...data.daily.map(d => d.memos), 1);
        const maxTime = Math.max(...data.daily.map(d => d.minutes), 1);

        grid.innerHTML = `
          <!-- 내 활동 요약 -->
          <div class="card">
            <div class="card-title">내 이번 주 활동</div>
            <div class="stat-row">
              <div class="stat-box">
                <div class="stat-num">${data.myStats.memos}</div>
                <div class="stat-label">메모 작성</div>
              </div>
              <div class="stat-box">
                <div class="stat-num green">${fmtTime(data.myStats.minutes)}</div>
                <div class="stat-label">이용 시간</div>
              </div>
            </div>
          </div>

          <!-- 인기 태그 -->
          <div class="card">
            <div class="card-title">이번 주 인기 태그</div>
            ${data.topTags.length === 0
              ? `<div style="color:var(--text-muted);font-size:0.85rem">이번 주 메모가 없습니다</div>`
              : `<div class="tag-list">${data.topTags.map(t =>
                  `<div class="tag-item">#${t.tag}<span>${t.cnt}개</span></div>`
                ).join("")}</div>`
            }
          </div>

          <!-- 요일별 차트 -->
          <div class="card full">
            <div class="card-title">요일별 내 활동</div>
            <div class="chart">
              ${data.daily.map(d => {
                const memoH = Math.round((d.memos / maxMemo) * 100);
                const timeH = Math.round((d.minutes / maxTime) * 100);
                return `
                  <div class="bar-group">
                    <div class="bar-wrap">
                      <div class="bar memo-bar" style="height:${memoH}px" title="메모 ${d.memos}개"></div>
                      <div class="bar time-bar"  style="height:${timeH}px"  title="이용 ${fmtTime(d.minutes)}"></div>
                    </div>
                    <div class="bar-day">${d.day}</div>
                  </div>`;
              }).join("")}
            </div>
            <div class="chart-legend">
              <span><span class="legend-dot" style="background:var(--accent)"></span>메모</span>
              <span><span class="legend-dot" style="background:var(--accent3)"></span>이용 시간</span>
            </div>
          </div>

          <!-- 팀원별 활동 -->
          <div class="card full">
            <div class="card-title">팀원별 활동 순위</div>
            <table class="team-table">
              <thead>
                <tr>
                  <th>순위</th>
                  <th>이름</th>
                  <th>메모</th>
                  <th>이용 시간</th>
                </tr>
              </thead>
              <tbody>
                ${data.teamStats.map((u, i) => {
                  const rankClass = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
                  const rankIcon  = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : i + 1;
                  const isMe = u.id === data.myId;
                  return `<tr${isMe ? ' class="me-row"' : ''}>
                    <td><span class="team-rank ${rankClass}">${rankIcon}</span></td>
                    <td>${u.name || u.email}${isMe ? ' <span style="font-size:0.75rem;color:var(--accent)">(나)</span>' : ''}</td>
                    <td><span class="badge badge-memo">${u.memos}</span></td>
                    <td><span class="badge badge-time">${fmtTime(u.minutes)}</span></td>
                  </tr>`;
                }).join("")}
              </tbody>
            </table>
          </div>
        `;
      } catch (e) {
        grid.innerHTML = `<div class="card full loading">리포트를 불러오지 못했습니다.</div>`;
      }
    }

    loadReport();
  </script>
</body>
</html>
